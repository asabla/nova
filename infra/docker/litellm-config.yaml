litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379

model_list:
  # These models will be selected by default in the
  # Nova UI for things like: conversations, rag embedding
  # model, and any other place where a model selection is
  # needed but the user has not specified one.
  # ------------- Default models --------------
  # - model_name: default-model
  #   litellm_params:
  #     model: openai/gpt-oss-20b
  #     api_base: http://host.docker.internal:1234/v1
  #     api_key: "not-needed"
  #
  # - model_name: default-embedding-model
  #   litellm_params:
  #     model: openai/text-embedding-nomic-embed-text-v1.5
  #     api_base: http://host.docker.internal:1234/v1
  #     api_key: "not-needed"
  # ------------- Default models --------------

  - model_name: default-embedding-model
    litellm_params:
      model: openai/text-embedding-3-small
      api_base: "https://eu.api.openai.com/v1"
      api_key: os.environ/OPENAI_EU_API_KEY

  - model_name: default-model
    litellm_params:
      model: openai/gpt-5.4
      api_base: "https://eu.api.openai.com/v1"
      api_key: os.environ/OPENAI_EU_API_KEY
      reasoning:
        effort: "low"
        summary: "detailed"
      max_output_tokens: 16000
      merge_reasoning_content_in_choices: true
      drop_params: true
      additional_drop_params:
        - temperature
        - top_p
        - presence_penalty
        - frequency_penalty
        - logprobs
        - top_logprobs
        - parallel_tool_calls
    model_info:
      mode: responses
      supports_reasoning: true
      base_model: openai/gpt-5.4

  # Optional: dedicated planning model for tier assessment and DAG generation.
  # If not configured, the conversation's own model is used instead.
  # Uncomment and point to a fast/cheap model to reduce planning latency and cost.
  # - model_name: planning-model
  #   litellm_params:
  #     model: openai/gpt-4.1-mini
  #     api_base: "https://eu.api.openai.com/v1"
  #     api_key: os.environ/OPENAI_EU_API_KEY

  # ------------- Lm Studio examples -------------
  - model_name: lmstudio/gpt-oss:20b
    litellm_params:
      model: openai/gpt-oss-20b
      api_base: http://host.docker.internal:1234/v1
      api_key: "not-needed"

  - model_name: lmstudio/text-embedding-nomic-embed-text-v1.5
    litellm_params:
      model: openai/text-embedding-nomic-embed-text-v1.5
      api_base: http://host.docker.internal:1234/v1
      api_key: "not-needed"
  # ------------- Lm Studio examples -------------

  - model_name: openai-embedding
    litellm_params:
      model: openai/text-embedding-3-small
      api_base: "https://eu.api.openai.com/v1"
      api_key: os.environ/OPENAI_EU_API_KEY

  - model_name: openai-gpt-5.4-responses
    litellm_params:
      model: openai/gpt-5.4
      api_base: "https://eu.api.openai.com/v1"
      api_key: os.environ/OPENAI_EU_API_KEY
      reasoning:
        effort: "low"
        summary: "detailed"
      max_output_tokens: 16000
      merge_reasoning_content_in_choices: true
      drop_params: true
      additional_drop_params:
        - temperature
        - top_p
        - presence_penalty
        - frequency_penalty
        - logprobs
        - top_logprobs
        - parallel_tool_calls
    model_info:
      mode: responses
      supports_reasoning: true
      base_model: openai/gpt-5.4
