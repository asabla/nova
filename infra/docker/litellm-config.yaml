model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/openai/gpt-oss-20b
      api_base: http://host.docker.internal:1234/v1
      api_key: "not-needed"

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/openai/gpt-oss-20b
      api_base: http://host.docker.internal:1234/v1
      api_key: "not-needed"

  - model_name: claude-sonnet-4-20250514
    litellm_params:
      model: openai/openai/gpt-oss-20b
      api_base: http://host.docker.internal:1234/v1
      api_key: "not-needed"

  - model_name: claude-haiku-3.5
    litellm_params:
      model: openai/openai/gpt-oss-20b
      api_base: http://host.docker.internal:1234/v1
      api_key: "not-needed"

  - model_name: default
    litellm_params:
      model: openai/openai/gpt-oss-20b
      api_base: http://host.docker.internal:1234/v1
      api_key: "not-needed"

  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-nomic-embed-text-v1.5
      api_base: http://host.docker.internal:1234/v1
      api_key: "not-needed"

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379
