litellm_settings:
  drop_params: true
  set_verbose: false
  cache: true
  cache_params:
    type: redis
    host: redis
    port: 6379

model_list:
  # LM Studio example
  - model_name: lmstudio/gpt-oss:20b
    litellm_params:
      model: gpt-oss:20b
      api_base: http://host.docker.internal:1234/v1
      api_key: "not-needed"

