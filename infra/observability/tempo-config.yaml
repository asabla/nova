# Tempo configuration for Nova observability stack
# Docs: https://grafana.com/docs/tempo/latest/configuration/

server:
  http_listen_port: 3200
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

compactor:
  compaction:
    block_retention: 720h  # 30 days

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: nova
  storage:
    path: /var/tempo/generator/wal
    remote_write: []

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
