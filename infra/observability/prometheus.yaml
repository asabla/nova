# Prometheus configuration for Nova observability stack
# Scrapes the Nova API /metrics endpoint directly.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "nova-api"
    static_configs:
      - targets: ["nova-api:3000"]
    metrics_path: /metrics

  - job_name: "temporal"
    static_configs:
      - targets: ["nova-temporal:9090"]
    metrics_path: /metrics
    scrape_interval: 30s
