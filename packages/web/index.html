<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NOVA - The self-hosted AI platform built for teams" />
    <title>NOVA</title>
    <script>
      // FOUC prevention: apply theme before first paint
      (function() {
        try {
          var stored = JSON.parse(localStorage.getItem('nova-ui') || '{}');
          var theme = (stored.state && stored.state.theme) || 'system';
          if (theme !== 'system') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
