# ─── NOVA Production Overrides ──────────────────────────────────────
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# Deployment scenarios:
#   1. Managed Cloud (by Nova) — all env vars set by Nova's control plane
#   2. Enterprise self-hosted  — operator fills in .env.production
#
# All secrets are read from environment variables.
# Copy .env.example to .env.production and fill in production values.
# ─────────────────────────────────────────────────────────────────────

services:
  # ─── Core Database ──────────────────────────────────
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-nova}
    ports: !reset []

  # ─── Redis ──────────────────────────────────────────
  redis:
    command: redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD:-}
    ports: !reset []

  # ─── MinIO ──────────────────────────────────────────
  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports: !reset []

  # ─── Temporal ───────────────────────────────────────
  temporal:
    environment:
      POSTGRES_USER: ${TEMPORAL_DB_USER:-nova}
      POSTGRES_PWD: ${TEMPORAL_DB_PASSWORD:?TEMPORAL_DB_PASSWORD is required}
    ports: !reset []

  temporal-db:
    environment:
      POSTGRES_USER: ${TEMPORAL_DB_USER:-nova}
      POSTGRES_PASSWORD: ${TEMPORAL_DB_PASSWORD:?TEMPORAL_DB_PASSWORD is required}

  # Remove Temporal UI in production (or put behind reverse proxy with auth)
  temporal-ui:
    profiles: ["debug"]

  # ─── Qdrant ─────────────────────────────────────────
  qdrant:
    ports: !reset []

  # ─── SearxNG ────────────────────────────────────────
  searxng:
    ports: !reset []

  # ─── NOVA API ───────────────────────────────────────
  api:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:?MINIO_PUBLIC_URL is required}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      APP_URL: ${APP_URL:?APP_URL is required}
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "4.0"

  # ─── Gateway ────────────────────────────────────────
  gateway:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      NOVA_GATEWAY_JWT_SECRET: ${NOVA_GATEWAY_JWT_SECRET:?NOVA_GATEWAY_JWT_SECRET is required}
    ports: !reset []

  # ─── Workers ────────────────────────────────────────
  worker-agent:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "4.0"

  worker-ingestion:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "4.0"

  worker-background:
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "4.0"

  # ─── Web & Admin ────────────────────────────────────
  web:
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  admin:
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
