services:
  # ─── Core Database (PostgreSQL) ───────────────────
  postgres:
    image: postgres:16
    container_name: nova-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: nova
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ───────────────
  minio:
    image: minio/minio:latest
    container_name: nova-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Temporal Server ─────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    container_name: nova-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: nova
      POSTGRES_PWD: nova
      POSTGRES_SEEDS: temporal-db
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-db:
    image: postgres:16-alpine
    container_name: nova-temporal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal-init:
    image: temporalio/auto-setup:latest
    container_name: nova-temporal-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Registering Temporal custom search attributes..."
        temporal operator search-attribute create --name NovaExecutionTier --type Keyword --address temporal:7233 2>/dev/null || true
        temporal operator search-attribute create --name NovaAgentId --type Keyword --address temporal:7233 2>/dev/null || true
        temporal operator search-attribute create --name NovaOrgId --type Keyword --address temporal:7233 2>/dev/null || true
        echo "Temporal search attributes registered."
    depends_on:
      temporal:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    container_name: nova-temporal-ui
    restart: unless-stopped
    ports:
      - "8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233

  # ─── Qdrant (vector + full-text search) ──────────
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: nova-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── SearxNG (self-hosted web search) ────────────
  searxng:
    image: searxng/searxng:latest
    container_name: nova-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:8888
    volumes:
      - ./infra/docker/searxng-settings.yaml:/etc/searxng/settings.yml:ro
      - searxng_data:/etc/searxng/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Sandbox Python (batteries-included image) ──
  sandbox-python:
    build:
      context: .
      dockerfile: infra/docker/sandbox/Dockerfile.python
    image: nova-sandbox-python:latest
    container_name: nova-sandbox-python-build
    restart: "no"
    entrypoint: ["echo", "Image built successfully"]

  # ─── Sandbox Init (pre-pull runtime images) ─────
  sandbox-init:
    image: docker:cli
    container_name: nova-sandbox-init
    restart: "no"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling sandbox runtime images..."
        docker pull python:3.12-slim
        docker pull node:20-slim
        docker pull node:22-slim
        docker pull bash:5.2
        docker pull alpine:3.19
        echo "Sandbox runtime images ready"
    depends_on:
      sandbox-python:
        condition: service_completed_successfully

  # ─── DB Init (migrations, seed, bucket) ─────────
  db-init:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      target: builder
    container_name: nova-db-init
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgres://nova:nova@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: nova-files
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      BETTER_AUTH_SECRET: change-me-in-production-use-openssl-rand-base64-32
      BETTER_AUTH_URL: http://localhost:5173
      APP_URL: http://localhost:5173
    volumes:
      - ./infra/docker/db-init.sh:/app/db-init.sh:ro
      - ./infra/docker/db-init-bucket.ts:/app/db-init-bucket.ts:ro
      - ./infra/docker/db-init-backfill-migrations.ts:/app/db-init-backfill-migrations.ts:ro
    entrypoint: ["sh", "/app/db-init.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── NOVA API ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: nova-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://nova:nova@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:5173/storage
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: nova-files
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      TEMPORAL_ADDRESS: temporal:7233
      BETTER_AUTH_SECRET: change-me-in-production-use-openssl-rand-base64-32
      BETTER_AUTH_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      APP_URL: http://localhost:5173
      QDRANT_URL: http://qdrant:6333
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db-init:
        condition: service_completed_successfully
      temporal-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ─── NOVA Gateway (internal infrastructure API) ──
  gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.gateway
    container_name: nova-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    # Internal only — no host port mapping in production
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgres://nova:nova@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: nova-files
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      NOVA_GATEWAY_JWT_SECRET: ${NOVA_GATEWAY_JWT_SECRET:-dev-gateway-secret}
      GATEWAY_PORT: 3001
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── NOVA Workers ───────────────────────────────
  worker-agent:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
      args:
        WORKER_PACKAGE: worker-agent
    container_name: nova-worker-agent
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    env_file: .env
    environment:
      DATABASE_URL: postgres://nova:nova@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      SEARXNG_URL: http://searxng:8080
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: nova-files
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      WORKER_BUILD_ID: ${WORKER_BUILD_ID:-dev}
      QDRANT_URL: http://qdrant:6333
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db-init:
        condition: service_completed_successfully
      temporal-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      searxng:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker-ingestion:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
      args:
        WORKER_PACKAGE: worker-ingestion
    container_name: nova-worker-ingestion
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    env_file: .env
    environment:
      DATABASE_URL: postgres://nova:nova@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: nova-files
      WORKER_BUILD_ID: ${WORKER_BUILD_ID:-dev}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      db-init:
        condition: service_completed_successfully
      temporal-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  worker-background:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
      args:
        WORKER_PACKAGE: worker-background
    container_name: nova-worker-background
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    env_file: .env
    environment:
      DATABASE_URL: postgres://nova:nova@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      SEARXNG_URL: http://searxng:8080
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: nova-files
      SANDBOX_ENABLED: ${SANDBOX_ENABLED:-false}
      WORKER_BUILD_ID: ${WORKER_BUILD_ID:-dev}
      QDRANT_URL: http://qdrant:6333
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db-init:
        condition: service_completed_successfully
      temporal-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      searxng:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ─── NOVA Web ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: nova-web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    ports:
      - "5173:80"
    depends_on:
      - api

  # ── Admin Portal ──────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.admin
    container_name: nova-admin
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    ports:
      - "5174:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  temporal_db_data:
  searxng_data:
  qdrant_data:
