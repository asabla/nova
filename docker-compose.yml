services:
  # ─── Core Database ────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nova-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: nova
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nova-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ───────────────
  minio:
    image: minio/minio:latest
    container_name: nova-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── LiteLLM Proxy ──────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: nova-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./infra/docker/litellm-config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml"]
    environment:
      LITELLM_MASTER_KEY: sk-nova-litellm-dev
      DATABASE_URL: postgresql://nova:nova@postgres:5432/litellm
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-admin}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOCAL_MODEL_API_BASE: ${LOCAL_MODEL_API_BASE:-}
      LOCAL_MODEL_NAME: ${LOCAL_MODEL_NAME:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Temporal Server ─────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    container_name: nova-temporal
    restart: unless-stopped
    ports:
      - "7233:7233"
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: nova
      POSTGRES_PWD: nova
      POSTGRES_SEEDS: temporal-db
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-db:
    image: postgres:16-alpine
    container_name: nova-temporal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal-ui:
    image: temporalio/ui:latest
    container_name: nova-temporal-ui
    restart: unless-stopped
    ports:
      - "8233:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233

  # ─── SearxNG (self-hosted web search) ────────────
  searxng:
    image: searxng/searxng:latest
    container_name: nova-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      SEARXNG_BASE_URL: http://localhost:8888
    volumes:
      - ./infra/docker/searxng-settings.yaml:/etc/searxng/settings.yml:ro
      - searxng_data:/etc/searxng/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── DB Init (migrations, seed, bucket) ─────────
  db-init:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
      target: builder
    container_name: nova-db-init
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgres://nova:nova@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: nova-files
      LITELLM_API_URL: http://litellm:4000
      LITELLM_MASTER_KEY: sk-nova-litellm-dev
      BETTER_AUTH_SECRET: change-me-in-production-use-openssl-rand-base64-32
      BETTER_AUTH_URL: http://localhost:5173
      APP_URL: http://localhost:5173
    volumes:
      - ./infra/docker/db-init.sh:/app/db-init.sh:ro
      - ./infra/docker/db-init-bucket.ts:/app/db-init-bucket.ts:ro
      - ./infra/docker/db-init-backfill-migrations.ts:/app/db-init-backfill-migrations.ts:ro
    entrypoint: ["sh", "/app/db-init.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── NOVA API ────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: nova-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://nova:nova@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:5173/storage
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: nova-files
      LITELLM_API_URL: http://litellm:4000
      LITELLM_MASTER_KEY: sk-nova-litellm-dev
      TEMPORAL_ADDRESS: temporal:7233
      BETTER_AUTH_SECRET: change-me-in-production-use-openssl-rand-base64-32
      BETTER_AUTH_URL: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      APP_URL: http://localhost:5173
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── NOVA Worker ─────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: nova-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://nova:nova@postgres:5432/nova
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      LITELLM_URL: http://litellm:4000
      SEARXNG_URL: http://searxng:8080
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: nova-files
      WORKER_BUILD_ID: ${WORKER_BUILD_ID:-dev}
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      searxng:
        condition: service_healthy

  # ─── NOVA Web ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    container_name: nova-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  temporal_db_data:
  searxng_data:
