name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck shared
        run: bun run --filter @nova/shared typecheck

      - name: Typecheck API
        run: bun run --filter @nova/api typecheck

      - name: Typecheck web
        run: bun run --filter @nova/web typecheck

      - name: Typecheck workers
        run: |
          bun run --filter @nova/worker-shared typecheck
          bun run --filter @nova/worker-agent typecheck
          bun run --filter @nova/worker-ingestion typecheck
          bun run --filter @nova/worker-background typecheck

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        run: bun pm audit 2>&1 || true
        # bun audit is best-effort; don't fail CI but surface warnings

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nova
          POSTGRES_PASSWORD: nova
          POSTGRES_DB: nova_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run API unit tests
        # Explicitly exclude packages/api/tests/e2e/ — those require a live API
        # server + full infra stack (RustFS, Qdrant, Temporal). They're run in a
        # separate job once we have that stack wired up.
        run: bun test packages/api/tests/lib packages/api/tests/routes packages/api/tests/services packages/api/tests/utils
        env:
          DATABASE_URL: postgresql://nova:nova@localhost:5432/nova_test
          REDIS_URL: redis://localhost:6379
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          BETTER_AUTH_SECRET: test-secret-must-be-at-least-32-chars-long
          BETTER_AUTH_URL: http://localhost:3000
          NODE_ENV: test

  test-worker-shared:
    name: Worker-Shared Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run worker-shared tests
        run: bun test packages/worker-shared/tests

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run web unit tests
        # Root-level .test.ts files only — packages/web/tests/e2e/*.e2e.test.ts
        # are Playwright specs that need a live dev server.
        run: bun test packages/web/tests/*.test.ts

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build shared
        run: bun run --filter @nova/shared build

      - name: Build API
        run: bun run --filter @nova/api build

      - name: Build web
        run: bun run --filter @nova/web build

      - name: Build workers
        run: |
          bun run --filter @nova/worker-shared build
          bun run --filter @nova/worker-agent build
          bun run --filter @nova/worker-ingestion build
          bun run --filter @nova/worker-background build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, test-api, test-web, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.api
          push: false
          tags: nova-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.web
          push: false
          tags: nova-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker Agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.worker
          build-args: WORKER_PACKAGE=worker-agent
          push: false
          tags: nova-worker-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker Ingestion image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.worker
          build-args: WORKER_PACKAGE=worker-ingestion
          push: false
          tags: nova-worker-ingestion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker Background image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.worker
          build-args: WORKER_PACKAGE=worker-background
          push: false
          tags: nova-worker-background:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.gateway
          push: false
          tags: nova-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.admin
          push: false
          tags: nova-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
